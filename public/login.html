<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ORLAND | Secure Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{ extend:{
        colors:{
          dark:'#0f1115', darkLighter:'#16181d', darkBorder:'#2b2d31',
          primary:'#3b82f6', success:'#10b981', danger:'#ef4444', warning:'#f59e0b', info:'#0ea5e9'
        },
        fontFamily:{ sans:['Inter','sans-serif'] }
      }}
    };
  </script>

  <style>
    [x-cloak]{display:none!important}
    @keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .login-animated-bg{
      background: linear-gradient(-45deg,#3b82f6,#8b5cf6,#ec4899,#0ea5e9);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    .glass{
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,.20);
      box-shadow: 0 25px 60px rgba(0,0,0,.45);
    }
    .floaty{ animation: float 6s ease-in-out infinite; }
    @keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-18px)}100%{transform:translateY(0)}}
  </style>
</head>

<body x-data="loginApp()" x-init="init()" class="min-h-screen font-sans">
  <div class="fixed inset-0 login-animated-bg flex items-center justify-center p-4">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-white/10 rounded-full blur-3xl floaty"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-500/30 rounded-full blur-3xl floaty" style="animation-delay:2s"></div>

    <div class="glass w-full max-w-md rounded-3xl p-8 md:p-10 text-white relative">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl border border-white/30">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <div>
            <div class="text-lg font-extrabold tracking-tight">ORLAND</div>
            <div class="text-xs text-white/70">Enterprise Operations Portal</div>
          </div>
        </div>

        <button @click="toggleTheme()" class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 grid place-items-center transition" title="Dark/Light">
          <i x-show="!isDark" class="fa-solid fa-moon"></i>
          <i x-show="isDark" x-cloak class="fa-solid fa-sun text-yellow-300"></i>
        </button>
      </div>

      <form @submit.prevent="doLogin()" class="space-y-5">
        <div>
          <label class="block text-[11px] font-extrabold uppercase tracking-widest text-white/80 mb-2">Email Address</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-white/50"></i>
            <input id="email" type="email" required
              class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none"
              placeholder="you@company.com">
          </div>
        </div>

        <div>
          <label class="block text-[11px] font-extrabold uppercase tracking-widest text-white/80 mb-2">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-white/50"></i>
            <input id="password" :type="showPw?'text':'password'" required
              class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-11 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none"
              placeholder="••••••••••">
            <button type="button" @click="showPw=!showPw" class="absolute right-3 top-2.5 w-8 h-8 grid place-items-center text-white/60 hover:text-white transition" title="Show/Hide">
              <i :class="showPw ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between mt-2">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" x-model="remember" class="rounded border-white/20 bg-black/20 text-blue-500 focus:ring-0 focus:ring-offset-0">
            <span class="text-xs text-white/80">Remember me</span>
          </label>
          <a href="/reset-request.html" class="text-xs text-white hover:text-blue-200 transition">Forgot Password?</a>
        </div>

        <button type="submit" :disabled="loading"
          class="w-full bg-white text-blue-600 hover:bg-blue-50 font-extrabold py-3.5 rounded-xl mt-4
                 shadow-[0_0_20px_rgba(255,255,255,0.25)] hover:shadow-[0_0_32px_rgba(255,255,255,0.45)]
                 transition-all flex items-center justify-center gap-2 group">
          <span x-show="!loading">Secure Login</span>
          <i x-show="!loading" class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
          <span x-show="loading" x-cloak class="flex items-center gap-2">
            <i class="fa-solid fa-circle-notch animate-spin"></i> Authenticating...
          </span>
        </button>

        <div class="text-[11px] text-white/70" x-show="err" x-cloak>
          <i class="fa-solid fa-triangle-exclamation me-1"></i>
          <span x-text="err"></span>
        </div>
      </form>

      <div class="mt-8 text-center text-[10px] text-white/50">
        <p>Protected by Cloudflare D1 & KV</p>
        <p>© 2026 ORLAND Systems</p>
      </div>
    </div>
  </div>

  <script>
    function loginApp(){
      return {
        loading:false,
        err:"",
        showPw:false,
        remember:true,
        isDark:true,
        init(){
          const t = localStorage.getItem("theme") || "dark";
          this.isDark = (t === "dark");
          // login uses its own bg, but we keep theme state consistent for dashboard
          // no need to toggle document class here; only store preference
        },
        toggleTheme(){
          this.isDark = !this.isDark;
          localStorage.setItem("theme", this.isDark ? "dark" : "light");
        },
        async api(path,opt={}){
          const headers = Object.assign({}, opt.headers||{});
          if(opt.body!=null && !headers["content-type"]) headers["content-type"]="application/json";
          const res = await fetch(path,{ method:opt.method||"GET", headers, body:opt.body||undefined, credentials:"include" });
          const ct = res.headers.get("content-type")||"";
          if(!ct.includes("application/json")){
            const t = await res.text().catch(()=> "");
            return { status:"server_error", data:{ http:res.status, body:t.slice(0,280)} };
          }
          return await res.json();
        },
        async doLogin(){
          this.err="";
          this.loading=true;
          try{
            const email = String(document.getElementById("email").value||"").trim().toLowerCase();
            const password = String(document.getElementById("password").value||"");
            const r = await this.api("/api/login",{ method:"POST", body:JSON.stringify({ email, password }) });
            if(r.status==="ok"){
              location.href="/";
              return;
            }
            this.err = "Login gagal: " + (r.status || "unknown");
          }catch(e){
            this.err = "Network error: " + String(e?.message||e);
          }finally{
            this.loading=false;
          }
        }
      }
    }
  </script>
</body>
</html>
