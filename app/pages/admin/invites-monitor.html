<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Invites Monitor</title>
</head>
<body>
  <script type="module">
    import { mountAdminShell } from "../../js/admin_shell.js";
    import mod from "../../modules/admin/mod_admin_invites_monitor.js";

    mountAdminShell("Invites Monitor", `
      <form id="adminInvitesFilterForm">
        <input id="adminInvitesSearch" type="text" placeholder="Search invite">
        <select id="adminInvitesLimit">
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button type="submit">Apply</button>
        <button type="button" id="adminInvitesExportBtn">Export CSV</button>
      </form>
      <div id="invitesMonitorInfo">Loading...</div>
      <div id="invitesMonitorPaging"></div>
      <ul id="invitesMonitorList"></ul>
    `);

    mod();
  </script>
</body>
</html>
