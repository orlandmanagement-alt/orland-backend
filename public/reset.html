<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Management — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}</style>
</head>
<body data-page="reset-confirm">
  <div id="toast-host" class="toast-host"></div>
  <div class="container py-5" style="max-width: 560px">
    <div class="orland-card p-4">
      <div class="brand mb-3">
        <div class="logo"><i class="fa-solid fa-lock-open"></i></div>
        <div>
          <div style="font-size:18px">Set Password Baru</div>
          <div class="small-muted" style="font-size:12px">Token diambil dari URL reset.</div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small-muted">New Password (min 10)</label>
          <div class="input-group">
            <input id="password" type="password" class="form-control orland-input" placeholder="••••••••••">
            <button class="btn orland-btn-ghost pw-toggle" type="button" data-target="password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="col-12 d-grid gap-2">
          <button id="btnReset" class="orland-btn"><i class="fa-solid fa-check me-2"></i>Reset</button>
          <a href="/index.html" class="orland-btn-ghost text-center"><i class="fa-solid fa-arrow-left me-2"></i>Ke login</a>
        </div>
      </div>

      <details class="mt-3">
        <summary class="small-muted">Debug</summary>
        <pre id="debugOut" class="small-muted mt-2" style="white-space:pre-wrap"></pre>
      </details>
    </div>
  </div>
  <script src="/assets/js/app.js"></script>
</body></html>
