<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ORLAND Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{ color-scheme: light dark; }
    body{
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(168,85,247,.14), transparent 28%),
        #0f172a;
    }
    .glass{
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,.9);
    }
    @media (prefers-color-scheme: dark){
      .glass{ background: rgba(15,23,42,.84); }
    }
  </style>
</head>
<body class="min-h-screen text-slate-900 dark:text-slate-100">
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md rounded-3xl border border-slate-200/70 dark:border-slate-700/70 glass shadow-2xl overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-2xl bg-slate-900 text-white dark:bg-white dark:text-slate-900 flex items-center justify-center text-xl font-black">O</div>
          <div>
            <h1 class="text-2xl font-extrabold">ORLAND Login</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Dashboard login dengan MFA support.</p>
          </div>
        </div>
      </div>

      <div class="p-6 space-y-5">
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="username"
              class="w-full px-4 py-3 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="you@example.com"
              required
            >
          </div>

          <div>
            <label class="block text-sm font-bold text-slate-600 dark:text-slate-300 mb-2">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              class="w-full px-4 py-3 rounded-2xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="••••••••"
              required
            >
          </div>

          <button
            id="btnLogin"
            type="submit"
            class="w-full px-5 py-3 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-black text-sm"
          >
            Sign In
          </button>
        </form>

        <div id="loginMsg" class="text-sm text-slate-500 dark:text-slate-400"></div>
        <div id="loginMfaBox" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { mountLoginMfaIntegration } from "/assets/js/login_page_mfa_integration.js";
    mountLoginMfaIntegration();
  </script>
</body>
</html>
