<!DOCTYPE html>
<html lang="id" x-data="orlandAdminApp()" :class="darkMode ? 'dark' : ''">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORLAND • Admin Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="/assets/css/admin.css" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: '#0f1115',
            darkLighter: '#16181d',
            darkBorder: '#2b2d31',
            primary: '#3b82f6',
            success: '#10b981',
            danger: '#ef4444',
            warning: '#f59e0b'
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .login-animated-bg {
      background: linear-gradient(-45deg, #3b82f6, #8b5cf6, #ec4899, #0ea5e9);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    .login-glass {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.55);
    }
    .floating-shape { animation: float 6s ease-in-out infinite; }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
  </style>
</head>

<body class="bg-[#0b1020] text-white font-sans overflow-hidden">

  <div id="toastHost" class="fixed top-4 right-4 z-[200] space-y-2"></div>

  <div class="fixed inset-0 login-animated-bg flex items-center justify-center p-4">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-white/10 rounded-full blur-3xl floating-shape"></div>
    <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-500/30 rounded-full blur-3xl floating-shape" style="animation-delay:2s;"></div>

    <div class="login-glass p-8 md:p-10 rounded-3xl w-full max-w-md relative z-10">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner border border-white/30">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 class="text-3xl font-bold tracking-tight mb-1">ORLAND</h1>
        <p class="text-sm text-white/70">Admin Portal</p>
      </div>

      <form @submit.prevent="doLogin" class="space-y-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-white/80 mb-2">Email</label>
          <div class="relative">
            <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-white/50"></i>
            <input x-ref="email" type="email" required
              placeholder="admin@orlandmanagement.com"
              class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-widest text-white/80 mb-2">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-3.5 text-white/50"></i>
            <input x-ref="password" type="password" required
              placeholder="••••••••••"
              class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none">
          </div>
        </div>

        <button type="submit" :disabled="isLoggingIn"
          class="w-full bg-white text-blue-600 hover:bg-blue-50 font-bold py-3.5 rounded-xl mt-6 shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:shadow-[0_0_30px_rgba(255,255,255,0.5)] transition-all flex items-center justify-center gap-2 group relative overflow-hidden">
          <span x-show="!isLoggingIn">Secure Login</span>
          <i x-show="!isLoggingIn" class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
          <span x-show="isLoggingIn" x-cloak class="flex items-center gap-2">
            <i class="fa-solid fa-circle-notch animate-spin"></i> Authenticating...
          </span>
        </button>
      </form>

      <div class="mt-8 text-center text-[10px] text-white/50">
        <p>Protected by Cloudflare Pages + D1 + KV</p>
        <p>&copy; 2026 ORLAND Systems.</p>
      </div>
    </div>
  </div>

  <script src="/assets/js/admin-app.js"></script>
</body>
</html>
