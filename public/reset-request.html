<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Management — Reset Request</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}</style>
</head>
<body data-page="reset-request">
  <div id="toast-host" class="toast-host"></div>
  <div class="container py-5" style="max-width: 560px">
    <div class="orland-card p-4">
      <div class="brand mb-3">
        <div class="logo"><i class="fa-solid fa-key"></i></div>
        <div>
          <div style="font-size:18px">Reset Password</div>
          <div class="small-muted" style="font-size:12px">Masukkan email, kami kirim link reset.</div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small-muted">Email</label>
          <input id="email" class="form-control orland-input" placeholder="you@domain.com" autocomplete="email">
        </div>
        <div class="col-12 d-grid gap-2">
          <button id="btnSend" class="orland-btn"><i class="fa-regular fa-paper-plane me-2"></i>Kirim Link</button>
          <a href="/index.html" class="orland-btn-ghost text-center"><i class="fa-solid fa-arrow-left me-2"></i>Kembali login</a>
        </div>
      </div>

      <details class="mt-3">
        <summary class="small-muted">Debug</summary>
        <pre id="debugOut" class="small-muted mt-2" style="white-space:pre-wrap"></pre>
      </details>
    </div>
  </div>
  <script src="/assets/js/app.js"></script>
</body></html>
