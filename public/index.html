<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>ORLAND | Enterprise Operations</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            dark: "#0f1115",
            darkLighter: "#16181d",
            darkBorder: "#2b2d31",
            primary: "#3b82f6",
            success: "#10b981",
            danger: "#ef4444",
            warning: "#f59e0b",
            info: "#0ea5e9",
            blogger: "#f57c00"
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{ color-scheme: dark; }
    html,body{ height:100% }
    body{ font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif }
    .sidebar-active{
      background: rgba(59,130,246,.10);
      color: #2563eb !important;
      border: 1px solid rgba(59,130,246,.15);
    }
    .sub-active{
      background: rgba(59,130,246,.10);
      color: #2563eb !important;
      border: 1px solid rgba(59,130,246,.12);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-dark dark:text-slate-200 transition-colors duration-200 text-sm overflow-hidden">

  <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-black/50 lg:hidden backdrop-blur-sm hidden"></div>

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-darkLighter shadow-xl transition-transform duration-300 lg:translate-x-0 lg:static lg:inset-0 border-r border-slate-200 dark:border-darkBorder flex flex-col -translate-x-full lg:translate-x-0">
      <div class="h-16 flex items-center px-5 border-b border-slate-200 dark:border-darkBorder justify-between shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white shadow-md">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <div>
            <div class="text-sm font-black tracking-tight text-slate-900 dark:text-white">ORLAND</div>
            <div class="text-[11px] text-slate-500">Enterprise Ops</div>
          </div>
        </div>
        <button id="btnSidebarClose" class="lg:hidden text-slate-400 hover:text-slate-200" type="button" aria-label="Close sidebar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto p-4">
        <p class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Core</p>
        <div id="nav-core" class="space-y-1"></div>

        <p class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Integrations</p>
        <div id="nav-integrations" class="space-y-1"></div>

        <p class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">System</p>
        <div id="nav-system" class="space-y-1"></div>

        <p class="px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-5 mb-2">Configuration</p>
        <div id="nav-config" class="space-y-1"></div>
      </nav>

      <div class="p-4 border-t border-slate-200 dark:border-darkBorder shrink-0">
        <button id="btnLogoutSide" class="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-danger/10 text-slate-800 dark:text-white hover:text-danger transition group" type="button">
          <div class="w-9 h-9 rounded-full bg-primary/15 flex items-center justify-center text-primary font-bold border border-primary/25 group-hover:bg-danger/15 group-hover:text-danger group-hover:border-danger/25 transition">
            <i class="fa-solid fa-power-off"></i>
          </div>
          <div class="text-left flex-1 overflow-hidden">
            <div class="text-xs font-black truncate">Logout</div>
            <div class="text-[10px] text-slate-500 truncate group-hover:text-danger transition">End session</div>
          </div>
        </button>
      </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 dark:bg-dark">
      <header class="h-16 bg-white dark:bg-darkLighter border-b border-slate-200 dark:border-darkBorder flex items-center justify-between px-4 sm:px-6 z-30 shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button id="btnSidebarOpen" class="lg:hidden text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" type="button" aria-label="Open sidebar">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="text-xs text-slate-500 dark:text-slate-400 truncate">
            <i class="fa-solid fa-house mr-2"></i>
            <span id="breadcrumb">/</span>
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button id="btnTheme" class="w-9 h-9 flex items-center justify-center rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-white/5 transition" type="button" aria-label="Toggle theme">
            <i id="icoTheme" class="fa-solid fa-moon"></i>
          </button>

          <div class="relative">
            <button id="btnNotice" class="w-9 h-9 flex items-center justify-center rounded-full text-slate-500 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-white/5 transition" type="button" aria-label="Notifications">
              <i class="fa-solid fa-bell"></i>
              <span class="absolute top-2 right-2 w-2 h-2 bg-danger rounded-full ring-2 ring-white dark:ring-darkLighter"></span>
            </button>

            <div id="noticeMenu" class="hidden absolute right-0 mt-2 w-72 rounded-xl border border-slate-200 dark:border-darkBorder bg-white dark:bg-darkLighter shadow-xl overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-slate-200 dark:border-darkBorder">
                <div class="text-xs font-black">Notifications</div>
                <div class="text-[11px] text-slate-500">Ringkas event penting sistem</div>
              </div>
              <div class="p-3 text-[12px] text-slate-600 dark:text-slate-300">
                <div class="flex gap-2">
                  <div class="mt-1 w-2 h-2 rounded-full bg-warning"></div>
                  <div>
                    <div class="font-bold">Info</div>
                    <div class="opacity-80">Belum ada notifikasi baru.</div>
                  </div>
                </div>
              </div>
              <div class="px-4 py-2 border-t border-slate-200 dark:border-darkBorder text-[11px] text-slate-500">
                Tip: modul Ops/Incidents akan mengisi notifikasi otomatis.
              </div>
            </div>
          </div>

          <div class="relative">
            <button id="btnProfile" class="flex items-center gap-2 rounded-xl px-2 py-1 hover:bg-slate-100 dark:hover:bg-white/5 transition" type="button" aria-label="Profile">
              <img id="hdrAvatar" class="w-9 h-9 rounded-full border border-slate-200 dark:border-darkBorder bg-slate-100" alt="avatar">
              <div class="hidden sm:block text-left leading-tight">
                <div id="hdrName" class="text-xs font-black truncate max-w-[160px]">—</div>
                <div id="hdrEmail" class="text-[10px] text-slate-500 truncate max-w-[160px]">—</div>
              </div>
              <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 hidden sm:block"></i>
            </button>

            <div id="profileMenu" class="hidden absolute right-0 mt-2 w-64 rounded-xl border border-slate-200 dark:border-darkBorder bg-white dark:bg-darkLighter shadow-xl overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-slate-200 dark:border-darkBorder">
                <div class="text-xs font-black" id="pmName">—</div>
                <div class="text-[11px] text-slate-500 truncate" id="pmEmail">—</div>
              </div>
              <button class="w-full text-left px-4 py-2 text-xs hover:bg-slate-50 dark:hover:bg-white/5" data-profile-action="profile" type="button">
                <i class="fa-solid fa-user me-2"></i> My Profile
              </button>
              <button class="w-full text-left px-4 py-2 text-xs hover:bg-slate-50 dark:hover:bg-white/5" data-profile-action="security" type="button">
                <i class="fa-solid fa-shield-halved me-2"></i> Security & Password
              </button>
              <div class="border-t border-slate-200 dark:border-darkBorder"></div>
              <button class="w-full text-left px-4 py-2 text-xs text-danger hover:bg-danger/10" data-profile-action="logout" type="button">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
              </button>
            </div>
          </div>
        </div>
      </header>

      <div class="flex-1 overflow-auto">
        <div class="p-4 sm:p-6 max-w-[1600px] mx-auto space-y-6">
          <div id="module-host"></div>
        </div>
      </div>
    </main>
  </div>
<script type="module" src="/assets/js/orland_core.js"></script>
  
  <script>
    (function(){
      const $ = (id)=>document.getElementById(id);

      function applyTheme(isDark){
        document.documentElement.classList.toggle("dark", !!isDark);
        localStorage.setItem("theme", isDark ? "dark" : "light");
        const ico = $("icoTheme");
        if(ico) ico.className = isDark ? "fa-solid fa-moon" : "fa-solid fa-sun";
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
      }

      const saved = localStorage.getItem("theme");
      applyTheme(saved !== "light");

      $("btnTheme")?.addEventListener("click", ()=>{
        const isDark = document.documentElement.classList.contains("dark");
        applyTheme(!isDark);
      });

      const overlay = $("sidebarOverlay");
      const sidebar = $("sidebar");

      function openSidebar(){
        sidebar?.classList.remove("-translate-x-full");
        overlay?.classList.remove("hidden");
      }

      function closeSidebar(){
        sidebar?.classList.add("-translate-x-full");
        overlay?.classList.add("hidden");
      }

      $("btnSidebarOpen")?.addEventListener("click", openSidebar);
      $("btnSidebarClose")?.addEventListener("click", closeSidebar);
      overlay?.addEventListener("click", closeSidebar);
      window.__orlandCloseSidebar = closeSidebar;

      const btnNotice = $("btnNotice");
      const noticeMenu = $("noticeMenu");
      btnNotice?.addEventListener("click", (e)=>{
        e.stopPropagation();
        noticeMenu?.classList.toggle("hidden");
        $("profileMenu")?.classList.add("hidden");
      });

      const btnProfile = $("btnProfile");
      const profileMenu = $("profileMenu");
      btnProfile?.addEventListener("click", (e)=>{
        e.stopPropagation();
        profileMenu?.classList.toggle("hidden");
        noticeMenu?.classList.add("hidden");
      });

      document.addEventListener("click", (e)=>{
        const inProfile = e.target.closest("#btnProfile") || e.target.closest("#profileMenu");
        const inNotice = e.target.closest("#btnNotice") || e.target.closest("#noticeMenu");
        if(!inProfile) profileMenu?.classList.add("hidden");
        if(!inNotice) noticeMenu?.classList.add("hidden");
      });

      document.querySelectorAll("[data-profile-action]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const act = btn.getAttribute("data-profile-action");
          profileMenu?.classList.add("hidden");
          if(act === "profile") return window.Orland.navigate("/profile", false);
          if(act === "security") return window.Orland.navigate("/profile/security", false);
          if(act === "logout"){
            await window.Orland.api("/api/logout", { method:"POST", body:"{}" });
            location.href = "/login.html";
          }
        });
      });

      $("btnLogoutSide")?.addEventListener("click", async ()=>{
        await window.Orland.api("/api/logout", { method:"POST", body:"{}" });
        location.href = "/login.html";
      });

      document.addEventListener("DOMContentLoaded", async ()=>{
        await window.Orland.bootDashboard();

        const me = window.Orland?.state?.me || {};
        $("pmName") && ($("pmName").textContent = me.display_name || me.email_norm || me.id || "—");
        $("pmEmail") && ($("pmEmail").textContent = me.email_norm || "—");

        if((location.pathname || "/") === "/"){
          setTimeout(()=>{
            if((location.pathname || "/") === "/" && window.Orland?.navigate){
              window.Orland.navigate("/dashboard", false);
            }
          }, 0);
        }
      });
    })();
  </script>
</body>
</html>
