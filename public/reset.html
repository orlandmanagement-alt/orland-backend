<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ORLAND • Set New Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow p-6">
    <h1 class="text-xl font-extrabold">Set New Password</h1>
    <p class="text-sm text-slate-500 mt-1">Masukkan password baru.</p>

    <div class="mt-4 space-y-3">
      <input id="pw" class="w-full px-3 py-2 border rounded-lg" placeholder="new password (min 10)" type="password">
      <button id="go" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg">Update</button>
      <a class="block text-center text-sm text-slate-600 hover:underline" href="/login.html">Kembali login</a>
    </div>

    <pre id="out" class="mt-4 text-xs bg-slate-900 text-slate-100 p-3 rounded-lg overflow-auto" style="max-height:240px;"></pre>
  </div>

<script>
async function api(path, opt={}){
  const headers = Object.assign({}, opt.headers||{});
  if(opt.body!=null && !headers["content-type"]) headers["content-type"]="application/json";
  const res = await fetch(path,{method:opt.method||"GET",headers,body:opt.body||undefined,credentials:"include"});
  const ct = res.headers.get("content-type")||"";
  if(!ct.includes("application/json")){
    const t = await res.text().catch(()=> "");
    return { status:"server_error", data:{ http:res.status, body:t.slice(0,300)} };
  }
  return await res.json();
}

const token = new URLSearchParams(location.search).get("token") || "";
(async ()=>{
  const v = await api("/api/password/reset/validate",{method:"POST",body:JSON.stringify({token})});
  document.getElementById("out").textContent = JSON.stringify(v,null,2);
  if(v.status!=="ok") alert("Token invalid/expired.");
})();

document.getElementById("go").onclick = async ()=>{
  const new_password = String(document.getElementById("pw").value||"");
  const r = await api("/api/password/reset/confirm",{method:"POST",body:JSON.stringify({token,new_password})});
  document.getElementById("out").textContent = JSON.stringify(r,null,2);
  if(r.status==="ok"){ alert("Reset sukses. Silakan login."); location.href="/login.html"; }
  else alert("Gagal: "+r.status);
};
</script>
</body>
</html>
