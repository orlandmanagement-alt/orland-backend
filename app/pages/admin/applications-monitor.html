<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Applications Monitor</title>
</head>
<body>
  <script type="module">
    import { mountAdminShell } from "../../js/admin_shell.js";
    import mod from "../../modules/admin/mod_admin_applications_monitor.js";

    mountAdminShell("Applications Monitor", `
      <form id="adminApplicationsFilterForm">
        <input id="adminApplicationsSearch" type="text" placeholder="Search application">
        <select id="adminApplicationsLimit">
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button type="submit">Apply</button>
        <button type="button" id="adminApplicationsExportBtn">Export CSV</button>
      </form>
      <div id="applicationsMonitorInfo">Loading...</div>
      <div id="applicationsMonitorPaging"></div>
      <ul id="applicationsMonitorList"></ul>
    `);

    mod();
  </script>
</body>
</html>
