<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ORLAND | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md rounded-2xl border border-white/10 bg-white/5 backdrop-blur p-6 shadow-2xl">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-11 h-11 rounded-xl bg-blue-500/20 grid place-items-center border border-blue-400/30">
        <i class="fa-solid fa-shield-halved text-blue-300"></i>
      </div>
      <div>
        <div class="text-lg font-extrabold tracking-tight">ORLAND</div>
        <div class="text-xs text-white/60">Enterprise Login</div>
      </div>
    </div>

    <div class="space-y-4">
      <div>
        <label class="text-xs font-bold text-white/70">Email</label>
        <input id="email" class="mt-2 w-full rounded-xl bg-black/20 border border-white/10 px-4 py-3 outline-none focus:border-white/30" placeholder="email" />
      </div>
      <div>
        <label class="text-xs font-bold text-white/70">Password</label>
        <input id="password" type="password" class="mt-2 w-full rounded-xl bg-black/20 border border-white/10 px-4 py-3 outline-none focus:border-white/30" placeholder="password" />
      </div>

      <button id="btnLogin" class="w-full rounded-xl bg-white text-slate-900 font-extrabold py-3 hover:bg-blue-50 transition">
        Secure Login
      </button>

      <pre id="out" class="text-[11px] text-white/60 whitespace-pre-wrap"></pre>

      <div class="text-[11px] text-white/40">
        First time? Create Super Admin via <code>/api/setup/bootstrap</code> (use your existing setup flow).
      </div>
    </div>
  </div>

  <script>
    async function api(path, opt={}){
      const headers = Object.assign({}, opt.headers||{});
      if(opt.body && !headers["content-type"]) headers["content-type"]="application/json";
      const res = await fetch(path, { method: opt.method||"GET", headers, body: opt.body||undefined, credentials:"include" });
      const ct = res.headers.get("content-type")||"";
      if(!ct.includes("application/json")){
        const t = await res.text().catch(()=> "");
        return { status:"server_error", data:{ http:res.status, body:t.slice(0,280) } };
      }
      return await res.json();
    }

    async function boot(){
      // if already logged in -> go dashboard
      const me = await api("/api/me");
      if(me.status==="ok"){ location.href="/"; return; }

      document.getElementById("btnLogin").onclick = async ()=>{
        const email = String(document.getElementById("email").value||"").trim().toLowerCase();
        const password = String(document.getElementById("password").value||"");
        const r = await api("/api/login", { method:"POST", body: JSON.stringify({ email, password }) });
        document.getElementById("out").textContent = JSON.stringify(r,null,2);
        if(r.status==="ok") location.href="/";
      };
      document.getElementById("password").addEventListener("keydown",(e)=>{
        if(e.key==="Enter") document.getElementById("btnLogin").click();
      });
    }
    boot();
  </script>
</body>
</html>
