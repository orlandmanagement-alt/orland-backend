<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ORLAND | Login</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = { theme:{ extend:{ colors:{ primary:'#3b82f6', danger:'#ef4444' }, fontFamily:{ sans:['Inter','sans-serif'] } } } };
  </script>

  <style>
    body{font-family:Inter,system-ui}
    @keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .login-animated-bg{background:linear-gradient(-45deg,#3b82f6,#8b5cf6,#ec4899,#0ea5e9);background-size:400% 400%;animation:gradientBG 15s ease infinite}
    .login-glass{background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.22);box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
  </style>
</head>

<body class="login-animated-bg min-h-screen flex items-center justify-center p-4">
  <div id="toast-host"></div>

  <div class="login-glass p-8 md:p-10 rounded-3xl w-full max-w-md text-white">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-white/30">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h1 class="text-3xl font-extrabold tracking-tight mb-1">ORLAND</h1>
      <p class="text-sm text-white/70">Enterprise Operations Portal</p>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-xs font-extrabold uppercase tracking-widest text-white/80 mb-2">Email</label>
        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-white/50"></i>
          <input id="email" type="email" required class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none">
        </div>
      </div>

      <div>
        <label class="block text-xs font-extrabold uppercase tracking-widest text-white/80 mb-2">Password</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-3.5 text-white/50"></i>
          <input id="password" type="password" required class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none">
        </div>
      </div>

      <div id="loginErr" class="text-xs text-red-200"></div>

      <button id="btnLogin" type="submit" class="w-full bg-white text-blue-600 hover:bg-blue-50 font-extrabold py-3.5 rounded-xl shadow-[0_0_20px_rgba(255,255,255,.25)] transition-all flex items-center justify-center gap-2">
        <span>Secure Login</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="text-center text-[10px] text-white/50 mt-4">
        Protected by Cloudflare D1 & KV • © 2026 ORLAND
      </div>
    </form>
  </div>

  <script src="/assets/js/orland_core.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async ()=> {
      await window.Orland.bootLogin();
    });
  </script>
</body>
</html>
