<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ORLAND • Initial Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow p-6">
    <h1 class="text-xl font-extrabold">Initial Setup</h1>
    <p class="text-sm text-slate-500 mt-1">Buat akun <b>Super Admin</b> pertama.</p>

    <div class="mt-4 space-y-3">
      <input id="name" class="w-full px-3 py-2 border rounded-lg" placeholder="display name (optional)">
      <input id="email" class="w-full px-3 py-2 border rounded-lg" placeholder="email" type="email">
      <input id="pass" class="w-full px-3 py-2 border rounded-lg" placeholder="password min 10" type="password">
      <button id="go" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg">Create Super Admin</button>
      <a class="block text-center text-sm text-slate-600 hover:underline" href="/login.html">Ke halaman login</a>
    </div>

    <pre id="out" class="mt-4 text-xs bg-slate-900 text-slate-100 p-3 rounded-lg overflow-auto" style="max-height:240px;"></pre>
  </div>

<script>
async function api(path, opt={}){
  const headers = Object.assign({}, opt.headers||{});
  if(opt.body!=null && !headers["content-type"]) headers["content-type"]="application/json";
  const res = await fetch(path,{method:opt.method||"GET",headers,body:opt.body||undefined,credentials:"include"});
  const ct = res.headers.get("content-type")||"";
  if(!ct.includes("application/json")){
    const t = await res.text().catch(()=> "");
    return { status:"server_error", data:{ http:res.status, body:t.slice(0,300)} };
  }
  return await res.json();
}

(async ()=>{
  const st = await api("/api/setup/status");
  document.getElementById("out").textContent = JSON.stringify(st,null,2);
  if(st.status==="ok" && !st.data?.setup_required){
    location.href="/login.html";
    return;
  }

  document.getElementById("go").onclick = async ()=>{
    const display_name = String(document.getElementById("name").value||"").trim();
    const email = String(document.getElementById("email").value||"").trim().toLowerCase();
    const password = String(document.getElementById("pass").value||"");
    const r = await api("/api/setup/bootstrap",{method:"POST",body:JSON.stringify({display_name,email,password})});
    document.getElementById("out").textContent = JSON.stringify(r,null,2);
    if(r.status==="ok"){ alert("OK. Silakan login."); location.href="/login.html"; }
    else alert("Gagal: "+r.status);
  };
})();
</script>
</body>
</html>
