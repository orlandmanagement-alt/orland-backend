<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sessions Monitor</title>
</head>
<body>
  <script type="module">
    import { mountAdminShell } from "../../js/admin_shell.js";
    import mod from "../../modules/admin/mod_admin_sessions_monitor.js";

    mountAdminShell("Sessions Monitor", `
      <form id="adminSessionsFilterForm">
        <input id="adminSessionsSearch" type="text" placeholder="Search session / user / email">
        <select id="adminSessionsLimit">
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <label>
          <input id="adminSessionsActiveOnly" type="checkbox" checked>
          Active only
        </label>
        <button type="submit">Apply</button>
        <button type="button" id="adminSessionsBulkRevokeBtn">Bulk Revoke</button>
      </form>
      <div id="sessionsInfo">Loading...</div>
      <div id="sessionsPaging"></div>
      <ul id="sessionsList"></ul>
    `);

    mod();
  </script>
</body>
</html>
