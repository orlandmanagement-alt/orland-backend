<!DOCTYPE html>
<html lang="id" x-data="orlandLogin()" :class="darkMode ? 'dark' : ''">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ORLAND | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { dark:'#0f1115', darkLighter:'#16181d', darkBorder:'#2b2d31', primary:'#3b82f6', danger:'#ef4444', warning:'#f59e0b' }, fontFamily:{ sans:['Inter','sans-serif'] } } }
    }
  </script>
  <style>
    [x-cloak]{display:none!important}
    @keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .login-animated-bg{background:linear-gradient(-45deg,#3b82f6,#8b5cf6,#ec4899,#0ea5e9);background-size:400% 400%;animation:gradientBG 15s ease infinite}
    .login-glass{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
  </style>
</head>
<body class="font-sans login-animated-bg min-h-screen flex items-center justify-center p-4">
  <div class="login-glass p-8 md:p-10 rounded-3xl w-full max-w-md text-white">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner border border-white/30">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight mb-1">ORLAND</h1>
      <p class="text-sm text-white/70">Enterprise Operations Portal</p>
    </div>

    <form @submit.prevent="doLogin" class="space-y-5">
      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-white/80 mb-2">Email Address</label>
        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-white/50"></i>
          <input id="email" type="email" required class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none" placeholder="admin@domain.com">
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-widest text-white/80 mb-2">Password</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-3.5 text-white/50"></i>
          <input id="password" type="password" required class="w-full bg-black/20 border border-white/10 text-white placeholder-white/30 pl-11 pr-4 py-3 rounded-xl focus:border-white/50 focus:bg-black/30 transition outline-none" placeholder="••••••••••">
        </div>
      </div>

      <button type="submit" :disabled="loading"
        class="w-full bg-white text-blue-600 hover:bg-blue-50 font-bold py-3.5 rounded-xl mt-6 transition-all flex items-center justify-center gap-2">
        <span x-show="!loading">Secure Login</span>
        <span x-show="loading" x-cloak class="flex items-center gap-2"><i class="fa-solid fa-circle-notch animate-spin"></i> Authenticating...</span>
      </button>

      <div x-show="err" x-cloak class="text-xs bg-red-500/15 border border-red-500/30 text-red-100 rounded-xl p-3">
        <b>Error:</b> <span x-text="err"></span>
      </div>
    </form>

    <div class="mt-8 text-center text-[10px] text-white/50">
      <p>© 2026 ORLAND Systems.</p>
    </div>
  </div>

  <script>
    function orlandLogin(){
      return {
        loading:false,
        err:"",
        darkMode:false,
        async api(path,opt={}){
          const headers = Object.assign({}, opt.headers||{});
          if(opt.body!=null && !headers["content-type"]) headers["content-type"]="application/json";
          const r = await fetch(path,{method:opt.method||"GET",headers,body:opt.body||undefined,credentials:"include"});
          const ct = r.headers.get("content-type")||"";
          if(!ct.includes("application/json")) return {status:"server_error", data:{http:r.status}};
          return await r.json();
        },
        async init(){
          // already logged in?
          try{
            const me = await this.api("/api/me");
            if(me.status==="ok"){ location.href="/"; }
          }catch{}
        },
        async doLogin(){
          this.err="";
          this.loading=true;
          const email = (document.getElementById("email").value||"").trim().toLowerCase();
          const password = (document.getElementById("password").value||"");
          const res = await this.api("/api/login",{method:"POST", body: JSON.stringify({email,password})});
          this.loading=false;
          if(res.status==="ok"){ location.href="/"; return; }
          this.err = res.status || "login_failed";
        }
      }
    }
    document.addEventListener("DOMContentLoaded", ()=>{ try{ Alpine.store("x"); }catch{} });
  </script>
  <script>
    document.addEventListener("alpine:init", ()=>{
      const c = document.querySelector("[x-data]");
      if(c && c.__x) c.__x.$data.init();
    });
  </script>
</body>
</html>
