<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Orland Management — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">
  <style>body{font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}</style>
</head>
<body data-page="login">
  <div id="toast-host" class="toast-host"></div>
  <div class="container py-5" style="max-width: 520px">
    <div class="orland-card p-4">
      <div class="brand mb-3">
        <div class="logo"><i class="fa-solid fa-shield-heart"></i></div>
        <div>
          <div style="font-size:18px">Orland Management</div>
          <div class="small-muted" style="font-size:12px">Enterprise Dashboard Login</div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label small-muted">Email</label>
          <input id="email" class="form-control orland-input" placeholder="you@domain.com" autocomplete="email">
        </div>
        <div class="col-12">
          <label class="form-label small-muted">Password</label>
          <div class="input-group">
            <input id="password" type="password" class="form-control orland-input" placeholder="••••••••••" autocomplete="current-password">
            <button class="btn orland-btn-ghost pw-toggle" type="button" data-target="password" aria-label="toggle password">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="col-12 d-grid gap-2">
          <button id="btnLogin" class="orland-btn"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</button>
          <a class="orland-btn-ghost text-center" href="/reset-request.html"><i class="fa-regular fa-envelope me-2"></i>Reset Password</a>
        </div>
      </div>

      <details class="mt-3">
        <summary class="small-muted">Debug</summary>
        <pre id="debugOut" class="small-muted mt-2" style="white-space:pre-wrap"></pre>
      </details>
    </div>
    <div class="small-muted text-center mt-3">© Orland Management</div>
  </div>
  <script src="/assets/js/app.js"></script>
</body></html>
