<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ORLAND | Enterprise Operations</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{ extend:{
        colors:{
          dark:'#0f1115', darkLighter:'#16181d', darkBorder:'#2b2d31',
          primary:'#3b82f6', success:'#10b981', danger:'#ef4444', warning:'#f59e0b', info:'#0ea5e9', blogger:'#f57c00'
        },
        fontFamily:{ sans:['Inter','sans-serif'] }
      }}
    };
  </script>

  <style>
    [x-cloak]{display:none!important}
    .sidebar-active{
      background-color:rgba(59,130,246,.12);
      color:#60a5fa!important;
      border-right:3px solid #3b82f6
    }
    .glass{
      background: rgba(15,17,21,.72);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="font-sans bg-slate-50 text-slate-800 dark:bg-dark dark:text-slate-200 transition-colors duration-200 text-sm overflow-hidden">
  <div id="toast-host"></div>

  <!-- overlay (IMPORTANT: pointer-events-none when hidden) -->
  <div id="sidebarOverlay"
       class="fixed inset-0 z-40 bg-black/55 lg:hidden backdrop-blur-sm hidden pointer-events-none"></div>

  <div class="flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar"
      class="fixed inset-y-0 left-0 z-50 w-72 bg-white/95 dark:bg-darkLighter/95 shadow-xl transition-transform duration-300 lg:translate-x-0 lg:static lg:inset-0 border-r border-slate-200 dark:border-darkBorder flex flex-col -translate-x-full lg:translate-x-0">

      <div class="h-16 flex items-center px-5 border-b border-slate-200 dark:border-darkBorder justify-between shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-primary rounded-xl flex items-center justify-center text-white shadow-md">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <div>
            <h1 class="text-base font-bold tracking-tight text-slate-900 dark:text-white leading-tight">ORLAND</h1>
            <div class="text-[10px] text-slate-500 dark:text-slate-400 -mt-[2px]">Enterprise Admin</div>
          </div>
        </div>
        <button id="btnSidebarClose" class="lg:hidden text-slate-400 hover:text-slate-200">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <nav class="flex-1 overflow-y-auto py-4">
        <p class="px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Core Operations</p>
        <div id="nav-core"></div>

        <p class="px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-2">Integrations</p>
        <div id="nav-integrations"></div>

        <p class="px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-2">System & Ops</p>
        <div id="nav-system"></div>

        <p class="px-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6 mb-2">Configuration</p>
        <div id="nav-config"></div>
      </nav>

      <div class="p-4 border-t border-slate-200 dark:border-darkBorder shrink-0">
        <button id="btnLogout"
          class="w-full flex items-center gap-3 p-2 rounded-xl hover:bg-danger/10 text-slate-800 dark:text-white hover:text-danger transition group">
          <div class="w-9 h-9 rounded-full bg-primary/15 flex items-center justify-center text-primary border border-primary/25 group-hover:bg-danger/15 group-hover:text-danger group-hover:border-danger/25 transition">
            <i class="fa-solid fa-power-off"></i>
          </div>
          <div class="text-left flex-1 overflow-hidden">
            <p class="text-xs font-bold truncate">Logout</p>
            <p class="text-[10px] text-slate-500 truncate group-hover:text-danger transition">End session</p>
          </div>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 dark:bg-dark">

      <!-- TOPBAR -->
      <header class="h-16 glass border-b border-slate-200/60 dark:border-darkBorder flex items-center justify-between px-4 sm:px-6 z-30 shrink-0">
        <div class="flex items-center gap-3">
          <button id="btnSidebarOpen" class="lg:hidden text-slate-200/80 hover:text-white">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div class="flex items-center gap-2 text-xs text-slate-200/70">
            <i class="fa-solid fa-house"></i>
            <span id="breadcrumb">/</span>
          </div>
        </div>

        <div class="flex items-center gap-2">

          <!-- Theme toggle -->
          <button id="btnTheme"
            class="w-10 h-10 flex items-center justify-center rounded-xl text-slate-200/70 hover:bg-white/10 transition"
            title="Toggle theme">
            <i id="icoThemeMoon" class="fa-solid fa-moon"></i>
            <i id="icoThemeSun" class="fa-solid fa-sun text-warning hidden"></i>
          </button>

          <!-- Notifications -->
          <div class="relative">
            <button id="btnNotif"
              class="relative w-10 h-10 flex items-center justify-center rounded-xl text-slate-200/70 hover:bg-white/10 transition"
              title="Notifications">
              <i class="fa-solid fa-bell"></i>
              <span class="absolute top-2 right-2 w-2 h-2 bg-danger rounded-full ring-2 ring-black/40"></span>
            </button>

            <div id="notifMenu"
              class="hidden absolute right-0 mt-2 w-72 rounded-2xl border border-white/10 bg-black/80 backdrop-blur text-white overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between">
                <div class="text-sm font-bold">Notifications</div>
                <div class="text-[10px] opacity-70">demo</div>
              </div>
              <div class="p-2 space-y-2">
                <div class="px-3 py-2 rounded-xl bg-white/5">
                  <div class="text-xs font-semibold">System</div>
                  <div class="text-[11px] opacity-70">No new alerts.</div>
                </div>
                <div class="px-3 py-2 rounded-xl bg-white/5">
                  <div class="text-xs font-semibold">Security</div>
                  <div class="text-[11px] opacity-70">All checks OK.</div>
                </div>
              </div>
              <button class="w-full text-left px-4 py-2 text-xs hover:bg-white/10 border-t border-white/10" id="btnNotifClose">
                Close
              </button>
            </div>
          </div>

          <!-- Profile -->
          <div class="relative">
            <button id="btnHdrProfile"
              class="w-10 h-10 rounded-xl overflow-hidden border border-white/10 bg-white/5 hover:bg-white/10 transition"
              title="Profile menu">
              <img id="hdrAvatar" class="w-full h-full object-cover" alt="me">
            </button>

            <div id="hdrProfileMenu"
              class="hidden absolute right-0 mt-2 w-60 rounded-2xl border border-white/10 bg-black/80 backdrop-blur text-white overflow-hidden z-50">
              <div class="px-4 py-3 border-b border-white/10">
                <div id="hdrName" class="text-sm font-bold truncate">—</div>
                <div id="hdrEmail" class="text-xs opacity-70 truncate">—</div>
              </div>
              <button class="w-full text-left px-4 py-2 text-sm hover:bg-white/10" data-profile-action="profile">
                <i class="fa-solid fa-user me-2"></i> My Profile
              </button>
              <button class="w-full text-left px-4 py-2 text-sm hover:bg-white/10" data-profile-action="security">
                <i class="fa-solid fa-shield-halved me-2"></i> Security & Password
              </button>
              <button class="w-full text-left px-4 py-2 text-sm text-red-300 hover:bg-red-500/10" data-profile-action="logout">
                <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
              </button>
            </div>
          </div>

        </div>
      </header>

      <!-- CONTENT -->
      <div class="flex-1 overflow-auto">
        <div class="p-6 max-w-[1600px] mx-auto space-y-6">
          <div id="module-host"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/assets/js/orland_core.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async ()=>{
      // ===== Theme init =====
      const theme = localStorage.getItem("theme") || "dark";
      if(theme === "dark") document.documentElement.classList.add("dark");
      else document.documentElement.classList.remove("dark");

      const icoMoon = document.getElementById("icoThemeMoon");
      const icoSun  = document.getElementById("icoThemeSun");
      function syncThemeIcons(){
        const isDark = document.documentElement.classList.contains("dark");
        icoMoon?.classList.toggle("hidden", isDark);
        icoSun?.classList.toggle("hidden", !isDark);
      }
      syncThemeIcons();

      document.getElementById("btnTheme")?.addEventListener("click", ()=>{
        const isDark = document.documentElement.classList.toggle("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        syncThemeIcons();
      });

      // ===== Boot Orland core =====
      await window.Orland.bootDashboard();

      // ===== Sidebar overlay safe click =====
      const overlay = document.getElementById("sidebarOverlay");
      const sidebar = document.getElementById("sidebar");
      const openBtn = document.getElementById("btnSidebarOpen");
      const closeBtn = document.getElementById("btnSidebarClose");

      function showOverlay(){
        overlay?.classList.remove("hidden");
        overlay?.classList.remove("pointer-events-none");
      }
      function hideOverlay(){
        overlay?.classList.add("hidden");
        overlay?.classList.add("pointer-events-none");
      }

      openBtn?.addEventListener("click", ()=>{
        sidebar?.classList.remove("-translate-x-full");
        showOverlay();
      });
      closeBtn?.addEventListener("click", ()=>{
        sidebar?.classList.add("-translate-x-full");
        hideOverlay();
      });
      overlay?.addEventListener("click", ()=>{
        sidebar?.classList.add("-translate-x-full");
        hideOverlay();
      });

      // ===== Notifications popup =====
      const btnNotif = document.getElementById("btnNotif");
      const notifMenu = document.getElementById("notifMenu");
      const btnNotifClose = document.getElementById("btnNotifClose");
      btnNotif?.addEventListener("click", ()=> notifMenu?.classList.toggle("hidden"));
      btnNotifClose?.addEventListener("click", ()=> notifMenu?.classList.add("hidden"));

      // ===== Profile dropdown =====
      const btnHdrProfile = document.getElementById("btnHdrProfile");
      const hdrMenu = document.getElementById("hdrProfileMenu");

      btnHdrProfile?.addEventListener("click", ()=> hdrMenu?.classList.toggle("hidden"));

      document.addEventListener("click", (e)=>{
        // close notif if click outside
        if(notifMenu && !notifMenu.classList.contains("hidden")){
          const insideNotif = e.target.closest("#btnNotif") || e.target.closest("#notifMenu");
          if(!insideNotif) notifMenu.classList.add("hidden");
        }
        // close profile if click outside
        if(hdrMenu && !hdrMenu.classList.contains("hidden")){
          const insideProfile = e.target.closest("#btnHdrProfile") || e.target.closest("#hdrProfileMenu");
          if(!insideProfile) hdrMenu.classList.add("hidden");
        }
      });

      document.querySelectorAll("[data-profile-action]").forEach(btn=>{
        btn.addEventListener("click", async ()=>{
          const act = btn.getAttribute("data-profile-action");
          hdrMenu?.classList.add("hidden");
          if(act==="profile") return window.Orland.navigate("/profile", false);
          if(act==="security") return window.Orland.navigate("/profile/security", false);
          if(act==="logout"){
            await window.Orland.api("/api/logout",{ method:"POST", body:"{}" });
            location.href="/login.html";
          }
        });
      });

      // logout in sidebar
      document.getElementById("btnLogout")?.addEventListener("click", async ()=>{
        await window.Orland.api("/api/logout",{ method:"POST", body:"{}" });
        location.href="/login.html";
      });

      // If Orland core supports uiCloseSidebar, wire it; else fallback here:
      window.Orland.uiCloseSidebar = window.Orland.uiCloseSidebar || function(){
        sidebar?.classList.add("-translate-x-full");
        hideOverlay();
      };

      // Auto close sidebar on any navigation click (mobile)
      // Capture clicks from nav buttons
      document.getElementById("sidebar")?.addEventListener("click", (e)=>{
        const btn = e.target.closest("button");
        if(!btn) return;
        // after Orland.navigate runs, close on mobile
        setTimeout(()=>{ if(window.innerWidth < 1024) window.Orland.uiCloseSidebar(); }, 50);
      });
    });
  </script>
</body>
</html>
